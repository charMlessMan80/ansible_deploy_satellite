---
# Defaults for satellite_subscription role.

satellite_version: "6.19"
rhel_major_release: "9"
rhsm_release: "{{ rhel_major_release }}"
rhsm_server_hostname: "subscription.rhsm.redhat.com"

# Repositories required to install Satellite 6.19 on RHEL 9.
satellite_required_repos:
  - "rhel-{{ rhel_major_release }}-for-x86_64-baseos-rpms"
  - "rhel-{{ rhel_major_release }}-for-x86_64-appstream-rpms"
  - "satellite-{{ satellite_version }}-for-rhel-{{ rhel_major_release }}-x86_64-rpms"
  - "satellite-maintenance-{{ satellite_version }}-for-rhel-{{ rhel_major_release }}-x86_64-rpms"
