[defaults]
# Default inventory can be overridden with -i inventories/<env>/hosts.yml
inventory              = inventories/production/hosts.yml
roles_path             = roles
collections_path       = collections
host_key_checking      = True
retry_files_enabled    = False
forks                  = 10
timeout                = 60
stdout_callback        = yaml
callbacks_enabled      = profile_tasks, timer
interpreter_python     = auto_silent
deprecation_warnings   = True
nocows                 = True

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root

[ssh_connection]
pipelining        = True
ssh_args          = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
control_path      = %(directory)s/%%h-%%r

[galaxy]
# The redhat.satellite collection is a Red Hat certified collection published
# on Red Hat Automation Hub, not on public Galaxy. Configure the server list so
# 'ansible-galaxy collection install -r requirements.yml' can reach it.
# Export your token first:  export ANSIBLE_HUB_TOKEN=<offline-token>
server_list = automation_hub, galaxy

[galaxy_server.automation_hub]
url       = https://console.redhat.com/api/automation-hub/content/published/
auth_url  = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
token     = ${ANSIBLE_HUB_TOKEN}

[galaxy_server.galaxy]
url = https://galaxy.ansible.com/
