---
# Production inventory for Red Hat Satellite 6.19
# Usage: ansible-playbook -i inventories/production/hosts.yml site.yml
all:
  vars:
    # --- Connection from the ansible-core "seed" server --------------------
    # This project runs from the seed and configures already-provisioned
    # hosts over SSH (the seed does not build the VM). Set the login identity
    # here; privilege escalation (sudo -> root) is enabled globally in
    # ansible.cfg. Distribute the seed user's public key to the target's
    # authorized_keys before the first run, and pre-seed the host key
    # (e.g. `ssh-keyscan -H <ip> >> ~/.ssh/known_hosts`) since
    # host_key_checking is enabled.
    ansible_user: svc_ansible
    ansible_ssh_private_key_file: ~/.ssh/satellite_seed_ed25519
  children:
    satellite:
      hosts:
        # The Satellite server FQDN must be resolvable (forward + reverse DNS)
        # and must match the certificate CN. Do not use short hostnames.
        satellite.prod.example.com:
          ansible_host: 10.10.0.10
