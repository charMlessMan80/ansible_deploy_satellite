---
# Production inventory for Red Hat Satellite 6.19
# Usage: ansible-playbook -i inventories/production/hosts.yml site.yml
all:
  children:
    satellite:
      hosts:
        # The Satellite server FQDN must be resolvable (forward + reverse DNS)
        # and must match the certificate CN. Do not use short hostnames.
        satellite.prod.example.com:
          ansible_host: 10.10.0.10
